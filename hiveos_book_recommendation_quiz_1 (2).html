<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiveOS Leadership Book Quiz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f0e0b;
  font-family: Georgia, 'Times New Roman', serif;
  color: #f5f0e8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow-x: hidden;
}
.bg-glow {
  position: fixed; inset: 0; pointer-events: none;
  background: radial-gradient(circle at 20% 80%, rgba(232,160,32,0.06) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(200,112,32,0.05) 0%, transparent 50%);
}
.watermark {
  position: fixed; bottom: -60px; right: -60px;
  font-size: 280px; line-height: 1; opacity: 0.025;
  pointer-events: none; user-select: none;
}
.wrap { width: 100%; max-width: 600px; position: relative; z-index: 1; }
.eyebrow {
  text-align: center; margin-bottom: 8px;
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: #e8a020; font-family: Arial, sans-serif; font-weight: 600;
}
.prog-bar-wrap { margin-bottom: 32px; margin-top: 8px; }
.prog-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
.prog-label { font-size: 11px; color: #8a7a60; font-family: Arial, sans-serif; letter-spacing: 0.05em; }
.prog-track { height: 2px; background: #2a2520; border-radius: 2px; }
.prog-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #e8a020, #f5c842);
  transition: width 0.4s ease;
}
/* Intro */
.intro { text-align: center; }
.intro-icon { font-size: 56px; margin-bottom: 16px; }
.intro h1 {
  font-size: clamp(28px,5vw,44px); font-weight: 400;
  line-height: 1.15; margin-bottom: 16px; letter-spacing: -0.01em;
}
.accent { color: #e8a020; font-style: italic; }
.intro p {
  font-size: 16px; color: #a89878; line-height: 1.7;
  margin: 0 auto 32px; max-width: 420px; font-family: Arial, sans-serif;
}
.stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
.stat { font-size: 13px; color: #e8a020; font-family: Arial, sans-serif; letter-spacing: 0.05em; }
.btn-primary {
  background: #e8a020; color: #0f0e0b; border: none;
  padding: 14px 40px; font-size: 15px; font-family: Arial, sans-serif;
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: background 0.2s;
  box-shadow: 0 4px 24px rgba(232,160,32,0.3);
}
.btn-primary:hover { background: #f5c842; }
.btn-primary:disabled { background: rgba(255,255,255,0.1); color: #4a4030; box-shadow: none; cursor: not-allowed; }
/* Question */
.q-icon { text-align: center; font-size: 40px; margin-bottom: 12px; }
.q-text {
  font-size: clamp(20px,3.5vw,28px); font-weight: 400;
  line-height: 1.3; letter-spacing: -0.01em; text-align: center; margin-bottom: 32px;
}
.opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.opt-btn {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px; padding: 16px 20px; text-align: left; color: #a89878;
  font-size: 15px; font-family: Arial, sans-serif; line-height: 1.5;
  cursor: pointer; transition: all 0.15s ease;
  display: flex; align-items: center; gap: 12px;
}
.opt-btn:hover { border-color: rgba(232,160,32,0.4); color: #f5f0e8; }
.opt-btn.selected { background: rgba(232,160,32,0.12); border: 1px solid #e8a020; color: #f5f0e8; }
.radio {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.opt-btn.selected .radio { background: #e8a020; border-color: #e8a020; }
.radio-dot { width: 8px; height: 8px; border-radius: 50%; background: #0f0e0b; display: none; }
.opt-btn.selected .radio-dot { display: block; }
.q-footer { text-align: center; }
/* Results */
.result-top { text-align: center; margin-bottom: 36px; }
.result-icon { font-size: 48px; margin-bottom: 12px; }
.result-eyebrow {
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: #e8a020; font-family: Arial; font-weight: 600; margin-bottom: 8px;
}
.result-title {
  font-size: clamp(24px,4vw,36px); font-weight: 400;
  line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.01em;
}
.result-author { font-size: 15px; color: #8a7a60; font-family: Arial; margin-bottom: 12px; }
.theme-badge {
  display: inline-block; background: rgba(232,160,32,0.1);
  border: 1px solid rgba(232,160,32,0.2); border-radius: 20px;
  padding: 4px 14px; font-size: 12px; color: #e8a020; font-family: Arial; margin-bottom: 16px;
}
.result-desc {
  font-size: 15px; color: #c8b898; line-height: 1.7;
  font-family: Arial; max-width: 460px; margin: 0 auto 8px;
}
.result-rec { font-size: 13px; color: #5a4a30; font-family: Arial; margin-bottom: 24px; }
.access-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
.btn-libby {
  display: inline-block; background: #e8a020; color: #0f0e0b;
  padding: 11px 24px; font-size: 13px; font-family: Arial; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase; text-decoration: none; border-radius: 2px;
}
.btn-spotify {
  display: inline-block; background: transparent;
  border: 1px solid #1db954; color: #1db954;
  padding: 11px 24px; font-size: 13px; font-family: Arial; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase; text-decoration: none; border-radius: 2px;
}
.runner-up-label {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: #5a4a30; font-family: Arial; margin-bottom: 14px; text-align: center;
}
.runner-ups { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.runner-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px; padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
}
.runner-emoji { font-size: 28px; }
.runner-info { flex: 1; }
.runner-title { font-size: 14px; font-weight: 400; margin-bottom: 2px; }
.runner-author { font-size: 12px; color: #6a5a40; font-family: Arial; }
.runner-links { display: flex; gap: 6px; }
.link-sm {
  font-size: 11px; font-family: Arial; text-decoration: none;
  letter-spacing: 0.05em; transition: opacity 0.15s;
}
.link-sm:hover { opacity: 0.75; }
.link-libby { color: #e8a020; }
.link-spotify { color: #1db954; }
.link-sep { color: #3a2a10; font-size: 11px; }
.result-footer {
  border-top: 1px solid rgba(255,255,255,0.06); padding-top: 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.link-list {
  font-size: 13px; color: #a89878; font-family: Arial; text-decoration: none; letter-spacing: 0.03em;
}
.link-list:hover { color: #f5f0e8; }
.btn-ghost {
  background: none; border: none; font-size: 13px; color: #5a4a30;
  font-family: Arial; cursor: pointer; letter-spacing: 0.03em; text-decoration: underline;
}
.btn-ghost:hover { color: #8a7a60; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="watermark">🍯</div>

<div class="wrap" id="app"></div>

<script>
const books = [
  { id:1, e:"📖", title:"The Servant", author:"James C. Hunter", theme:"Leadership Fundamentals", spotify:null, desc:"A story-driven exploration of servant leadership — leading with character and integrity.", rec:"Peter Croat", tags:["accountability","story","new-leader","values","foundational"], libby:"https://libbyapp.com" },
  { id:2, e:"💪", title:"Extreme Ownership", author:"Jocko Willink & Leif Babin", theme:"Leadership Fundamentals", spotify:"https://open.spotify.com/show/4VFiiDr8KGhW2lU713lPkJ", desc:"Navy SEALs on hard leadership lessons: own everything, no excuses.", rec:"Hillik & Daniel McCommons", tags:["accountability","ownership","practical","mid-career","action"], libby:"https://libbyapp.com" },
  { id:3, e:"🏔", title:"The Leadership Challenge", author:"Kouzes & Posner", theme:"Leadership Fundamentals", spotify:null, desc:"The most research-backed leadership framework: Five Practices of Exemplary Leadership.", rec:"Daniel McCommons", tags:["frameworks","research","mid-career","team-building","practical"], libby:"https://libbyapp.com" },
  { id:4, e:"📈", title:"Good to Great", author:"Jim Collins", theme:"Leadership Fundamentals", spotify:"https://open.spotify.com/show/3exxpelqccP8Wps0WSPM0j", desc:"What separates good companies from truly great — and what leaders do differently.", rec:"Daniel McCommons", tags:["strategy","case-studies","senior","organizational","research"], libby:"https://libbyapp.com" },
  { id:5, e:"🏆", title:"Trillion Dollar Coach", author:"Eric Schmidt et al.", theme:"Leadership Fundamentals", spotify:"https://open.spotify.com/show/1aFXS6SP8uHegxPqnzWAWJ", desc:"Bill Campbell's playbook — the legendary coach who shaped Google, Apple, and more.", rec:"Jon Repka", tags:["coaching","senior","practical","team-building","influence"], libby:"https://libbyapp.com" },
  { id:6, e:"🌱", title:"Mindset", author:"Carol S. Dweck", theme:"Mindset & Growth", spotify:"https://open.spotify.com/show/5FacZgaBduE2ibawQ07uuQ", desc:"Growth vs. fixed mindset — how it fundamentally shapes every success in work and life.", rec:"Hillik", tags:["mindset","psychology","personal-growth","foundational","self-development"], libby:"https://libbyapp.com" },
  { id:7, e:"⚡", title:"Triggers", author:"Marshall Goldsmith", theme:"Mindset & Growth", spotify:null, desc:"Hidden environmental triggers that shape behavior — design intentional responses.", rec:"Hillik", tags:["behavior-change","self-awareness","practical","personal-growth","senior"], libby:"https://libbyapp.com" },
  { id:8, e:"🔑", title:"The 7 Habits", author:"Stephen R. Covey", theme:"Mindset & Growth", spotify:"https://open.spotify.com/show/3iLQytsYrh5TKNFLu4p3jv", desc:"A timeless framework for personal and professional effectiveness built around character.", rec:"Daniel McCommons", tags:["foundational","frameworks","new-leader","personal-growth","practical"], libby:"https://libbyapp.com" },
  { id:9, e:"⚛", title:"Atomic Habits", author:"James Clear", theme:"Mindset & Growth", spotify:"https://open.spotify.com/show/40ygvasZaqVMMBkgYoUy8C", desc:"How 1% improvements compound into remarkable results — the science of habit formation.", rec:"Tyler Swanson", tags:["habits","practical","personal-growth","action","self-development"], libby:"https://libbyapp.com" },
  { id:10, e:"🪞", title:"Leadership & Self-Deception", author:"The Arbinger Institute", theme:"Mindset & Growth", spotify:null, desc:"How self-justification undermines leadership — and getting out of the box.", rec:"Greg Reid", tags:["accountability","story","self-awareness","relationships","values"], libby:"https://libbyapp.com" },
  { id:11, e:"🎯", title:"Payoff", author:"Dan Ariely", theme:"Communication & Influence", spotify:null, desc:"What truly motivates people at work — meaning and ownership matter more than money.", rec:"Tyler Swanson", tags:["motivation","psychology","team-building","research","influence"], libby:"https://libbyapp.com" },
  { id:12, e:"🤝", title:"Everyone Communicates, Few Connect", author:"John C. Maxwell", theme:"Communication & Influence", spotify:null, desc:"Connecting — not just communicating — is the single most important leadership skill.", rec:"Tyler Swanson", tags:["communication","connecting","practical","foundational","influence"], libby:"https://libbyapp.com" },
  { id:13, e:"🎙", title:"Never Split the Difference", author:"Chris Voss", theme:"Communication & Influence", spotify:"https://open.spotify.com/show/0tT2oNsE2sOcLf8GR0UMUK", desc:"FBI hostage negotiator tactics that apply powerfully to everyday professional life.", rec:"Tyler Swanson", tags:["negotiation","communication","practical","mid-career","action"], libby:"https://libbyapp.com" },
  { id:14, e:"✨", title:"Captivate", author:"Vanessa Van Edwards", theme:"Communication & Influence", spotify:"https://open.spotify.com/show/1Lmv6Ckh2blqdy4CdH7xUl", desc:"Science-backed strategies for mastering the social dynamics that drive success.", rec:"Tyler Swanson", tags:["communication","psychology","relationships","practical","influence"], libby:"https://libbyapp.com" },
  { id:15, e:"💬", title:"Radical Candor", author:"Kim Scott", theme:"Communication & Influence", spotify:"https://open.spotify.com/show/67Vzogak2VMTlWvDqazxSS", desc:"Give feedback that is both honest and caring — be direct without losing humanity.", rec:"Greg Reid", tags:["feedback","communication","practical","mid-career","team-building"], libby:"https://libbyapp.com" },
  { id:16, e:"⏱", title:"The Effective Executive", author:"Peter F. Drucker", theme:"Strategy & Performance", spotify:null, desc:"Make effective decisions, manage time ruthlessly, and focus on contribution.", rec:"Tyler Swanson", tags:["strategy","time-management","senior","practical","decision-making"], libby:"https://libbyapp.com" },
  { id:17, e:"♟", title:"Co-opetition", author:"Brandenburger & Nalebuff", theme:"Strategy & Performance", spotify:null, desc:"Compete and cooperate simultaneously — game theory meets business strategy.", rec:"Greg Reid", tags:["strategy","senior","frameworks","organizational","big-picture"], libby:"https://libbyapp.com" },
  { id:18, e:"🔗", title:"The Goal", author:"Eliyahu M. Goldratt", theme:"Strategy & Performance", spotify:null, desc:"Theory of Constraints in a business novel — eliminate the bottlenecks limiting you.", rec:"Eric Micheals", tags:["systems","story","operations","strategy","practical"], libby:"https://libbyapp.com" },
  { id:19, e:"🧩", title:"The Mythical Man-Month", author:"Frederick P. Brooks Jr.", theme:"Strategy & Performance", spotify:null, desc:"Why more people doesn't mean faster — timeless lessons in organizational complexity.", rec:"Eric Micheals", tags:["systems","operations","technical","senior","frameworks"], libby:"https://libbyapp.com" },
  { id:20, e:"🧠", title:"Thinking, Fast and Slow", author:"Daniel Kahneman", theme:"Strategy & Performance", spotify:null, desc:"Nobel-winning insights on the two systems driving human thought and decision-making.", rec:"Eric Micheals", tags:["decision-making","psychology","research","senior","big-picture"], libby:"https://libbyapp.com" }
];

const Qs = [
  { q:"What's your biggest leadership challenge right now?", icon:"🎯",
    opts:[
      { l:"Building accountability — getting my team to own outcomes", t:["accountability","ownership","action"] },
      { l:"Communicating with impact — connecting, influencing, feedback", t:["communication","influence","connecting"] },
      { l:"Growing myself — habits, mindset, and self-awareness", t:["personal-growth","mindset","self-development"] },
      { l:"Thinking bigger — strategy, decisions, organizational performance", t:["strategy","decision-making","big-picture"] }
    ]
  },
  { q:"Where are you in your leadership journey?", icon:"📍",
    opts:[
      { l:"New to leadership — building my foundation", t:["new-leader","foundational"] },
      { l:"Mid-career — leveling up effectiveness and team impact", t:["mid-career","team-building"] },
      { l:"Senior leader — refining and operating at the top", t:["senior","organizational"] },
      { l:"I lead myself first — personal development is my priority", t:["personal-growth","self-awareness","habits"] }
    ]
  },
  { q:"What kind of book do you actually finish?", icon:"📚",
    opts:[
      { l:"Stories and parables — I learn through narrative", t:["story"] },
      { l:"Practical how-tos — tools I can use on Monday", t:["practical","action"] },
      { l:"Research and psychology — I want the 'why'", t:["psychology","research"] },
      { l:"Case studies — real companies, real results", t:["case-studies","organizational"] }
    ]
  },
  { q:"If you could instantly sharpen one skill, it would be...", icon:"⚡",
    opts:[
      { l:"Negotiating, persuading, getting to yes", t:["negotiation","influence"] },
      { l:"Building habits and behaviors that actually stick", t:["habits","behavior-change"] },
      { l:"Making smarter, faster decisions", t:["decision-making","systems"] },
      { l:"Giving feedback and developing my people", t:["feedback","team-building","coaching"] }
    ]
  },
  { q:"How do you prefer to consume books?", icon:"🎧",
    opts:[
      { l:"Audiobook while commuting — Spotify is ideal for me", t:["spotify"] },
      { l:"Ebook on my phone or tablet", t:["libby"] },
      { l:"Physical book — old school works best", t:["libby"] },
      { l:"Any format — just give me the best book", t:[] }
    ]
  }
];

let step = 0, answers = [], selected = null;

function scoreBooks() {
  const tc = {};
  const spotifyPref = answers[4] && answers[4].includes("spotify");
  answers.forEach(at => at.forEach(t => { tc[t] = (tc[t]||0)+1; }));
  return books.map(b => {
    let s = 0;
    b.tags.forEach(t => { if(tc[t]) s += tc[t]; });
    if(spotifyPref && b.spotify) s += 2;
    return {...b, score: s};
  }).sort((a,b) => b.score - a.score).slice(0,3);
}

function render() {
  const app = document.getElementById('app');

  if (step === 0) {
    app.innerHTML = `
      <div class="intro">
        <div class="intro-icon">📚</div>
        <div class="eyebrow">HiveOS · Leadership Reading List</div>
        <h1>Find your next<br><span class="accent">leadership read</span></h1>
        <p>5 quick questions — we'll match you to the best book from Honeycomb's curated reading list for where you are right now.</p>
        <div class="stats">
          <span class="stat">20 books</span>
          <span class="stat">5 questions</span>
          <span class="stat">~2 minutes</span>
        </div>
        <button class="btn-primary" onclick="step=1;render()">Start the Quiz →</button>
      </div>`;
    return;
  }

  if (step >= 1 && step <= 5) {
    const q = Qs[step-1];
    const pct = Math.round((step/5)*100);
    app.innerHTML = `
      <div class="eyebrow">Question ${step} of 5</div>
      <div class="prog-bar-wrap">
        <div class="prog-meta">
          <span class="prog-label">QUESTION ${step} OF 5</span>
          <span class="prog-label">${pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-icon">${q.icon}</div>
      <h2 class="q-text">${q.q}</h2>
      <div class="opts" id="opts"></div>
      <div class="q-footer">
        <button class="btn-primary" id="nxt" disabled onclick="advance()">
          ${step === 5 ? 'See My Match →' : 'Next →'}
        </button>
      </div>`;

    const opts = document.getElementById('opts');
    q.opts.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn' + (selected === i ? ' selected' : '');
      btn.innerHTML = `<div class="radio"><div class="radio-dot"></div></div><span>${o.l}</span>`;
      btn.onclick = () => { selected = i; render(); };
      opts.appendChild(btn);
    });
    document.getElementById('nxt').disabled = selected === null;
    return;
  }

  if (step === 6) {
    const res = scoreBooks();
    const top = res[0];
    app.innerHTML = `
      <div class="prog-bar-wrap">
        <div class="prog-track"><div class="prog-fill" style="width:100%"></div></div>
      </div>
      <div class="result-top">
        <div class="result-icon">${top.e}</div>
        <div class="result-eyebrow">Your Top Match</div>
        <h2 class="result-title">${top.title}</h2>
        <p class="result-author">by ${top.author}</p>
        <span class="theme-badge">${top.theme}</span>
        <p class="result-desc">${top.desc}</p>
        <p class="result-rec">Recommended by ${top.rec}</p>
        <div class="access-btns">
          <a href="${top.libby}" target="_blank" class="btn-libby">📚 Free on Libby</a>
          ${top.spotify ? `<a href="${top.spotify}" target="_blank" class="btn-spotify">🎧 Listen on Spotify</a>` : ''}
        </div>
      </div>
      <div class="runner-up-label">Also great for you</div>
      <div class="runner-ups">
        ${res.slice(1).map(b => `
          <div class="runner-card">
            <span class="runner-emoji">${b.e}</span>
            <div class="runner-info">
              <div class="runner-title">${b.title}</div>
              <div class="runner-author">by ${b.author}</div>
            </div>
            <div class="runner-links">
              <a href="${b.libby}" target="_blank" class="link-sm link-libby">LIBBY</a>
              ${b.spotify ? `<span class="link-sep">·</span><a href="${b.spotify}" target="_blank" class="link-sm link-spotify">SPOTIFY</a>` : ''}
            </div>
          </div>`).join('')}
      </div>
      <div class="result-footer">
        <a href="https://www.notion.so/32701e1bcb958102963ce1afcbed458f" target="_blank" class="link-list">
          📖 View Full Reading List →
        </a>
        <button class="btn-ghost" onclick="restart()">Retake Quiz</button>
      </div>`;
    return;
  }
}

function advance() {
  if (selected === null) return;
  answers.push(Qs[step-1].opts[selected].t);
  selected = null;
  step++;
  render();
}

function restart() {
  step = 0; answers = []; selected = null; render();
}

render();
</script>
</body>
</html>
